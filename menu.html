<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyStep App</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --accent: #4ade80;
      --glass-sidebar: rgba(0, 0, 0, 0.2);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      height: 100vh;
      width: 100vw;
      /* Використовуємо той самий градієнт, що й на ваших фото */
      background: radial-gradient(circle at top left, #2ecc71, #27ae60, #145a32);
      color: white;
      overflow: hidden;
    }

    /* Бічне меню */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--glass-sidebar);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 40px 20px;
      z-index: 10;
    }

    .sidebar h2 {
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 50px;
      text-align: center;
      letter-spacing: -1px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-grow: 1;
    }

    .sidebar a, .sidebar button {
      text-decoration: none;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      padding: 16px 20px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    .sidebar i {
      margin-right: 15px;
      font-size: 1.2rem;
      width: 25px;
      text-align: center;
      color: var(--accent);
    }

    .sidebar a:hover, .sidebar button:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transform: translateX(5px);
      border-color: var(--glass-border);
    }

    /* Активний стан (якщо захочете додати через JS) */
    .sidebar a.active {
      background: var(--accent);
      color: #052e16;
    }
    .sidebar a.active i { color: #052e16; }

    .logout-btn {
      margin-top: auto;
      background: rgba(231, 76, 60, 0.15) !important;
      color: #ff9999 !important;
    }

    .logout-btn:hover {
      background: #e74c3c !important;
      color: white !important;
    }

    /* Головна область контенту — ТУТ ОСНОВНІ ЗМІНИ */
    .content {
      flex: 1;
      height: 100vh;
      position: relative;
      background: transparent; /* Щоб фон body просвічувався, якщо треба */
    }

    .content iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block; /* Прибирає зайві відступи знизу */
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h2>PyStep</h2>
    
    <nav class="nav-links">
      <a href="courses.html" target="mainFrame"><i class="fa-solid fa-graduation-cap"></i> Курси</a>
      <a href="shop.html" target="mainFrame"><i class="fa-solid fa-store"></i> Магазин</a>
      <a href="settings.html" target="mainFrame"><i class="fa-solid fa-gear"></i> Налаштування</a>
      <a href="games.html" target="mainFrame"><i class="fa-solid fa-gamepad"></i> Ігри</a>
    </nav>

    <button class="logout-btn" onclick="logout()">
      <i class="fa-solid fa-power-off"></i> Вийти
    </button>
  </aside>

  <main class="content">
    <iframe name="mainFrame" src="courses.html"></iframe>
  </main>

  <script>
    function logout() {
      localStorage.removeItem("loggedUser");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
